# SPDX-License-Identifier: MIT
# JavaScript port CI: test against the shared conformance vectors on every OS, publish to npm on tag.
name: js

on:
  push:
    branches: [main]
    paths: ["js/**", "conformance/**", ".github/workflows/js.yml"]
    tags: ["js-v*"]
  pull_request:
    paths: ["js/**", "conformance/**", ".github/workflows/js.yml"]

defaults:
  run:
    working-directory: js

jobs:
  test:
    name: test (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Test (conformance vectors + property fuzz + adversarial suite)
        run: node --test

  # Publish to npm on a `js-vX.Y.Z` tag, with build provenance.
  # Oleh: add an `NPM_TOKEN` repo secret (an npm automation token for the `namz` package) before tagging.
  publish:
    name: publish to npm
    if: startsWith(github.ref, 'refs/tags/js-v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      # Note: no `--provenance`. Provenance signs an entry into Sigstore's Rekor transparency log, which is
      # keyed by the (deterministic) tarball digest — a failed attempt leaves an entry that makes every
      # retry 409 ("equivalent entry already exists"). Re-enable for a future version if desired.
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
