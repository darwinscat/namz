# SPDX-License-Identifier: MIT
# Python port CI: test against the shared conformance vectors on every OS, publish to PyPI on tag.
name: python

on:
  push:
    branches: [main]
    paths: ["python/**", "conformance/**", ".github/workflows/python.yml"]
    tags: ["python-v*"]
  pull_request:
    paths: ["python/**", "conformance/**", ".github/workflows/python.yml"]

defaults:
  run:
    working-directory: python

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.13"]
        include:
          - os: ubuntu-latest
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[test]"
      - name: Test (conformance vectors + property fuzz + adversarial suite)
        run: pytest -q

  build:
    name: build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: python/dist/*

  # Publish to PyPI on a `python-vX.Y.Z` tag via Trusted Publishing (OIDC) — no tokens stored.
  # Oleh: configure a PyPI "trusted publisher" for project `namz` (owner darwinscat, repo namz,
  # workflow python.yml, environment pypi) before the first tagged release.
  publish:
    name: publish to PyPI
    if: startsWith(github.ref, 'refs/tags/python-v')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
